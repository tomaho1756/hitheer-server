# hithere coturn config
# Replace placeholders before running:
#   - ${EXTERNAL_IP}: the public IP this server is reachable on (LAN IP is fine for local dev).
#   - ${STATIC_AUTH_SECRET}: must match TURN_STATIC_AUTH_SECRET on the signaling server.
#   - ${REALM}: a stable string (any domain-like value).

listening-port=3478
tls-listening-port=5349

# Bind on all interfaces. coturn still needs external-ip to advertise correctly behind NAT.
listening-ip=0.0.0.0
# external-ip is REQUIRED when coturn is behind any NAT (Docker bridge counts!).
# For local LAN testing, set this to the host's LAN IP (e.g. 192.168.1.42).
external-ip=${EXTERNAL_IP}

# REST-API style auth: signaling server signs short-lived credentials with this secret.
use-auth-secret
static-auth-secret=${STATIC_AUTH_SECRET}

realm=${REALM}

# Relay port range (UDP). Open these in your firewall / Docker port mapping.
min-port=49160
max-port=49200

# Allow STUN too (so a single server covers both STUN and TURN).
fingerprint
lt-cred-mech

# Logging
verbose
no-stdout-log
log-file=stdout

# Lock things down a bit
no-cli
no-tlsv1
no-tlsv1_1

# Uncomment + provide cert/key for production TLS:
# cert=/etc/coturn/fullchain.pem
# pkey=/etc/coturn/privkey.pem
