# Firebase App Hosting config — hithere web (Next.js).
# Apply with:
#   firebase apphosting:backends:create --project hitheer-app --location asia-east1
#   firebase apphosting:rollouts:create <BACKEND_ID>
#
# Or wire up GitHub auto-deploys via the Firebase console
# (Build → App Hosting → Add backend → connect repo → root: apps/web).

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  timeoutSeconds: 60

env:
  # ---- public (NEXT_PUBLIC_*) — baked into the client bundle at build ----
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: hitheer-app.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: hitheer-app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: hitheer-app.appspot.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: firebase-messaging-sender-id
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: firebase-app-id
    availability:
      - BUILD
      - RUNTIME

  # ---- signaling backend (Cloud Run) ----
  # Fill in once the signaling Cloud Run service is deployed.
  # Use the *.run.app URL until Cloud Run custom domain mapping is wired up
  # (requires Search Console domain ownership verification, deferred).
  - variable: NEXT_PUBLIC_SIGNALING_URL
    value: wss://hithere-signaling-hu52c2jt6q-du.a.run.app/ws
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SIGNALING_HTTP
    value: https://hithere-signaling-hu52c2jt6q-du.a.run.app
    availability:
      - BUILD
      - RUNTIME

  # ---- site origin (used by Stripe Checkout success/cancel + API CORS) ----
  - variable: NEXT_PUBLIC_SITE_ORIGIN
    value: https://hithere.dedyn.io
    availability:
      - BUILD
      - RUNTIME

  # ---- Stripe ----
  # Sandbox keys for beta. Swap STRIPE_SECRET_KEY + STRIPE_WEBHOOK_SECRET +
  # both price IDs to live values via `firebase apphosting:secrets:set` once
  # the business is registered. No code change needed.
  - variable: STRIPE_SECRET_KEY
    secret: stripe-secret-key
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: stripe-webhook-secret
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_PRO
    value: price_1TZ0DdFa4gLk0wOQDEWaYgDr
    availability:
      - RUNTIME
  - variable: STRIPE_PRICE_PROFESSIONAL
    value: price_1TZ0DeFa4gLk0wOQrfC61QCc
    availability:
      - RUNTIME

  # ---- Firebase Admin SDK ----
  # Service-account JSON (full file content). Used by /api/stripe/webhook +
  # /api/friends/* to bypass Firestore rules and verify ID tokens.
  - variable: FIREBASE_ADMIN_SA_JSON
    secret: firebase-admin-sa-json
    availability:
      - RUNTIME
